# Full reference: https://haavardnk.github.io/lrimmich/configuration/

[[catalogs]]
catalog = "~/Pictures/ClassicLibrary/ClassicLibrary.lrcat"
# strip = "raw/"
# exclude_collections = []
# exclude_patterns = []

[immich]
url = "http://localhost:2283"
api_key = "your-api-key-here"
library_paths = ["/external/images/raw/"]
# share_albums_with = ["user-uuid-here"]

[sync]
albums = true
favorites = true
ratings = true
tags = true
captions = true
rejects = false
stacks = false
skip_empty = true
scope = "collections"
album_mode = "managed"
album_collision = "merge"
album_filter = "all"
album_min_rating = 0
# album_name_format = "{path}"
# keyword_prefix = "lr:keyword:"
# color_prefix = "lr:color:"

# [[album_rules]]
# match = "Reise/*"
# filter = "flagged"
# min_rating = 3
# description = "Travel photos from trips"
# order = "desc"

[cache]
# ttl_days = 90
# spot_check_pct = 5

[safety]
delete_threshold = 100
remove_percent_limit = 50
disable_deletes = false

